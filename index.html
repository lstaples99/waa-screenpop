<title>Incoming Call — WAA Support</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green:    #1A3A2A;
    --green-mid:#2C5C42;
    --green-lt: #3D7A5A;
    --amber:    #E8A020;
    --amber-lt: #F5C060;
    --ground:   #F2F4F3;
    --white:    #FFFFFF;
    --text:     #0F1F17;
    --muted:    #6B8070;
    --border:   #D4DDD8;
    --red:      #C0392B;
  }

  html, body {
    height: 100%;
    background: var(--ground);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }

  .card {
    background: var(--white);
    border-radius: 12px;
    width: 100%;
    max-width: 480px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08), 0 0 0 1px var(--border);
  }

  .header {
    background: var(--green);
    padding: 1.25rem 1.5rem;
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  .pulse {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--amber);
    flex-shrink: 0;
    animation: pulse 1.4s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%       { opacity: 0.5; transform: scale(0.85); }
  }

  .header-label {
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--amber-lt);
  }

  .header-sub {
    font-size: 0.78rem;
    color: rgba(255,255,255,0.55);
    margin-top: 0.1rem;
  }

  .body {
    padding: 2rem 1.5rem 1.5rem;
  }

  .eyebrow {
    font-size: 0.68rem;
    font-weight: 600;
    letter-spacing: 0.09em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.5rem;
  }

  .phone {
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    font-size: 2.1rem;
    font-weight: 600;
    letter-spacing: 0.02em;
    color: var(--green);
    line-height: 1.1;
    font-variant-numeric: tabular-nums;
  }

  .phone.unknown {
    color: var(--muted);
    font-size: 1.4rem;
    font-style: italic;
    font-family: -apple-system, sans-serif;
    font-weight: 400;
  }

  .meta {
    margin-top: 1rem;
    padding-top: 1rem;
    border-top: 1px solid var(--border);
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.75rem;
  }

  .meta-item {}
  .meta-label {
    font-size: 0.65rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.2rem;
  }
  .meta-value {
    font-size: 0.82rem;
    color: var(--text);
    font-weight: 500;
  }

  .actions {
    margin-top: 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
  }

  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    padding: 0.75rem 1rem;
    border-radius: 8px;
    font-size: 0.88rem;
    font-weight: 600;
    cursor: pointer;
    border: none;
    text-decoration: none;
    transition: opacity 0.15s, transform 0.1s;
  }
  .btn:active { transform: scale(0.98); }

  .btn-primary {
    background: var(--green);
    color: var(--white);
  }
  .btn-primary:hover { background: var(--green-mid); }

  .btn-secondary {
    background: var(--ground);
    color: var(--green);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover { background: var(--border); }

  .countdown-bar-wrap {
    margin-top: 1.25rem;
    padding-top: 1rem;
    border-top: 1px solid var(--border);
  }

  .countdown-label {
    font-size: 0.72rem;
    color: var(--muted);
    margin-bottom: 0.4rem;
    display: flex;
    justify-content: space-between;
  }

  .countdown-track {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .countdown-fill {
    height: 100%;
    background: var(--amber);
    border-radius: 2px;
    width: 100%;
    transition: width 0.1s linear;
  }

  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 0.35rem;
    font-size: 0.7rem;
    font-weight: 600;
    padding: 0.25rem 0.6rem;
    border-radius: 99px;
    margin-top: 0.6rem;
  }
  .badge-searching {
    background: rgba(232,160,32,0.12);
    color: #9A6A00;
  }
  .badge-redirecting {
    background: rgba(26,58,42,0.1);
    color: var(--green);
  }
  .badge-notfound {
    background: rgba(192,57,43,0.1);
    color: var(--red);
  }
</style>

<div class="card">
  <div class="header">
    <div class="pulse" id="pulseEl"></div>
    <div>
      <div class="header-label">Incoming Call</div>
      <div class="header-sub" id="queueLabel">Wreaths Across America Support</div>
    </div>
  </div>

  <div class="body">
    <div class="eyebrow">Caller Number</div>
    <div class="phone" id="phoneDisplay">—</div>
    <div id="statusBadge"></div>

    <div class="meta" id="metaRow">
      <div class="meta-item">
        <div class="meta-label">Engagement ID</div>
        <div class="meta-value" id="engagementDisplay">—</div>
      </div>
      <div class="meta-item">
        <div class="meta-label">Direction</div>
        <div class="meta-value">Inbound</div>
      </div>
    </div>

    <div class="actions" id="actionsEl"></div>

    <div class="countdown-bar-wrap" id="countdownWrap" style="display:none">
      <div class="countdown-label">
        <span id="countdownText">Opening Freshdesk in 4s…</span>
        <span id="cancelLink" style="cursor:pointer;color:var(--green);text-decoration:underline" onclick="cancelRedirect()">Cancel</span>
      </div>
      <div class="countdown-track">
        <div class="countdown-fill" id="countdownFill"></div>
      </div>
    </div>
  </div>
</div>

<script>
  const FRESHDESK     = 'https://wreathsacrossamerica.freshdesk.com';
  const AGENT_DESKTOP = 'https://waa-agent-desktop.vercel.app';
  const MAKE_WEBHOOK  = 'https://hook.us2.make.com/xn86l8acs56aqm3lde7j4xsgpierjvfg';
  const COUNTDOWN_SEC = 4;

  const params       = new URLSearchParams(window.location.search);
  const phone        = params.get('phone') || '';
  const engagementId = params.get('engagement_id') || '';

  const phoneEl       = document.getElementById('phoneDisplay');
  const engEl         = document.getElementById('engagementDisplay');
  const actionsEl     = document.getElementById('actionsEl');
  const badgeEl       = document.getElementById('statusBadge');
  const countdownWrap = document.getElementById('countdownWrap');
  const countdownText = document.getElementById('countdownText');
  const countdownFill = document.getElementById('countdownFill');

  if (phone) {
    phoneEl.textContent = formatPhone(phone);
  } else {
    phoneEl.textContent = 'Number unavailable';
    phoneEl.classList.add('unknown');
  }
  engEl.textContent = engagementId ? engagementId.slice(0, 16) + '…' : '—';

  // Silently ping Make with the phone number so Freshdesk/BC lookup runs in background
  if (phone) {
    fetch(MAKE_WEBHOOK + '?phone=' + encodeURIComponent(phone) + '&engagement_id=' + encodeURIComponent(engagementId), {
      method: 'GET',
      mode: 'no-cors'
    }).catch(function() {});
  }

  function formatPhone(num) {
    const d = num.replace(/\D/g, '');
    if (d.length === 11 && d[0] === '1') {
      return `+1 (${d.slice(1,4)}) ${d.slice(4,7)}-${d.slice(7)}`;
    }
    return num;
  }

  const agentDesktopURL = phone
    ? `${AGENT_DESKTOP}/?phone=${encodeURIComponent(phone)}&engagement_id=${encodeURIComponent(engagementId)}`
    : AGENT_DESKTOP;
  const newContactURL = `${FRESHDESK}/a/contacts/new?mobile=${encodeURIComponent(phone)}`;

  if (phone) {
    setBadge('searching', 'Opening Agent Desktop…');
    renderActions(agentDesktopURL, newContactURL);
    startCountdown(agentDesktopURL);
  } else {
    setBadge('notfound', 'No caller number in this event');
    renderActions(null, newContactURL);
  }

  function setBadge(type, text) {
    badgeEl.innerHTML = `<span class="status-badge badge-${type}"><span>●</span>${text}</span>`;
  }

  function renderActions(searchUrl, newUrl) {
    let html = '';
    if (searchUrl) {
      html += `<a class="btn btn-primary" href="${searchUrl}" target="_blank">Open Agent Desktop</a>`;
    }
    html += `<a class="btn btn-secondary" href="${newUrl}" target="_blank">Create New Contact</a>`;
    actionsEl.innerHTML = html;
  }

  let countdownTimer = null;
  let cancelled = false;

  function startCountdown(url) {
    countdownWrap.style.display = 'block';
    const total = COUNTDOWN_SEC * 1000;
    const start = Date.now();

    countdownTimer = setInterval(() => {
      if (cancelled) return;
      const elapsed = Date.now() - start;
      const remaining = Math.max(0, total - elapsed);
      const pct = (remaining / total) * 100;
      countdownFill.style.width = pct + '%';
      const secs = Math.ceil(remaining / 1000);
      countdownText.textContent = `Opening Agent Desktop in ${secs}s…`;

      if (remaining <= 0) {
        clearInterval(countdownTimer);
        setBadge('redirecting', 'Opening Freshdesk…');
        countdownText.textContent = 'Opening…';
        window.open(url, '_blank');
      }
    }, 80);
  }

  function cancelRedirect() {
    cancelled = true;
    clearInterval(countdownTimer);
    countdownWrap.style.display = 'none';
    setBadge('notfound', 'Auto-open cancelled');
  }

  window.cancelRedirect = cancelRedirect;
</script>
