<title>Incoming Call — WAA Support</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy:     #162F53;
    --navy-mid: #1e3f6e;
    --green:    #3F8D3E;
    --green-lt: #52a851;
    --red:      #A70D0D;
    --dark-grey:#3C3C3E;
    --lt-grey:  #EDEDEF;
    --white:    #FFFFFF;
    --text:     #1a1a1c;
    --muted:    #5a5a5e;
    --border:   #d8d8dc;
    --ground:   #f4f4f6;
  }

  html, body {
    height: 100%;
    background: var(--ground);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 14px;
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 1rem;
    min-height: 100vh;
  }

  .card {
    background: var(--white);
    border-radius: 8px;
    border: 1px solid var(--border);
    box-shadow: 0 2px 12px rgba(22,47,83,0.10);
    width: 100%;
    max-width: 420px;
    overflow: hidden;
  }

  .header {
    background: var(--navy);
    padding: 0.75rem 1.25rem;
    display: flex;
    align-items: center;
    gap: 0.75rem;
    border-bottom: 3px solid var(--green);
  }

  .header-logo {
    height: 28px;
    width: auto;
    flex-shrink: 0;
  }

  .header-divider {
    width: 1px;
    height: 20px;
    background: rgba(255,255,255,0.2);
  }

  .header-label {
    font-size: 0.58rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.85);
    flex: 1;
  }

  .pulse {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--green);
    flex-shrink: 0;
    animation: pulse 1.4s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%       { opacity: 0.45; transform: scale(0.8); }
  }

  .call-banner {
    background: var(--red);
    padding: 0.35rem 1.25rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .call-banner-label {
    font-size: 0.55rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--white);
  }

  .call-banner-id {
    font-size: 0.6rem;
    color: rgba(255,255,255,0.6);
    font-variant-numeric: tabular-nums;
  }

  .body {
    padding: 1.25rem;
  }

  .eyebrow {
    font-size: 0.55rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.4rem;
  }

  .phone-display {
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    font-size: 1.9rem;
    font-weight: 600;
    color: var(--navy);
    letter-spacing: 0.02em;
    line-height: 1.1;
    font-variant-numeric: tabular-nums;
  }

  .phone-display.unknown {
    font-size: 1.1rem;
    font-style: italic;
    color: var(--muted);
    font-family: 'Inter', sans-serif;
    font-weight: 400;
  }

  .meta-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.6rem 0.75rem;
    margin-top: 1rem;
    padding-top: 1rem;
    border-top: 1px solid var(--border);
  }

  .meta-label {
    font-size: 0.55rem;
    font-weight: 700;
    letter-spacing: 0.09em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.15rem;
  }

  .meta-value {
    font-size: 0.8rem;
    font-weight: 500;
    color: var(--text);
  }

  .actions {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    margin-top: 1.1rem;
  }

  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.4rem;
    padding: 0.65rem 1rem;
    border-radius: 4px;
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    cursor: pointer;
    border: none;
    text-decoration: none;
    transition: background 0.15s, transform 0.1s;
  }
  .btn:active { transform: scale(0.98); }

  .btn-primary {
    background: var(--navy);
    color: var(--white);
  }
  .btn-primary:hover { background: var(--navy-mid); }

  .btn-secondary {
    background: var(--ground);
    color: var(--navy);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover { background: var(--border); }

  .countdown-wrap {
    margin-top: 1rem;
    padding-top: 1rem;
    border-top: 1px solid var(--border);
    display: none;
  }

  .countdown-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 0.4rem;
  }

  .countdown-text {
    font-size: 0.7rem;
    color: var(--muted);
  }

  .countdown-cancel {
    font-size: 0.7rem;
    color: var(--green);
    text-decoration: underline;
    cursor: pointer;
    background: none;
    border: none;
    padding: 0;
    font-family: inherit;
  }

  .countdown-track {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .countdown-fill {
    height: 100%;
    background: var(--green);
    border-radius: 2px;
    width: 100%;
    transition: width 0.08s linear;
  }

  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 0.3rem;
    font-size: 0.6rem;
    font-weight: 600;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    padding: 0.2rem 0.55rem;
    border-radius: 2px;
    margin-top: 0.5rem;
  }

  .badge-live      { background: rgba(167,13,13,0.1);  color: var(--red); }
  .badge-opening   { background: rgba(22,47,83,0.1);   color: var(--navy); }
  .badge-cancelled { background: rgba(60,60,62,0.1);   color: var(--dark-grey); }
  .badge-nophone   { background: rgba(60,60,62,0.1);   color: var(--dark-grey); }
</style>

<div class="card">
  <div class="header">
    <img class="header-logo"
      src="https://wreathsblob.blob.core.windows.net/mainsite-static/WAA_020201_Logo_Horizontal_WhiteType.png"
      alt="Wreaths Across America">
    <div class="header-divider"></div>
    <div class="header-label">Agent Desktop</div>
    <div class="pulse"></div>
  </div>

  <div class="call-banner">
    <div class="call-banner-label">● Incoming Call</div>
    <div class="call-banner-id" id="engagementDisplay">—</div>
  </div>

  <div class="body">
    <div class="eyebrow">Caller Number</div>
    <div class="phone-display" id="phoneDisplay">—</div>
    <div id="statusBadge"></div>

    <div class="meta-grid">
      <div>
        <div class="meta-label">Direction</div>
        <div class="meta-value">Inbound</div>
      </div>
      <div>
        <div class="meta-label">Queue</div>
        <div class="meta-value">WAA Support</div>
      </div>
    </div>

    <div class="actions" id="actionsEl"></div>

    <div class="countdown-wrap" id="countdownWrap">
      <div class="countdown-header">
        <span class="countdown-text" id="countdownText">Opening Agent Desktop in 4s…</span>
        <button class="countdown-cancel" onclick="cancelRedirect()">Cancel</button>
      </div>
      <div class="countdown-track">
        <div class="countdown-fill" id="countdownFill"></div>
      </div>
    </div>
  </div>
</div>

<script>
  const FRESHDESK     = 'https://wreathsacrossamerica.freshdesk.com';
  const AGENT_DESKTOP = 'https://waa-agent-desktop.vercel.app';
  const MAKE_WEBHOOK  = 'https://hook.us2.make.com/xn86l8acs56aqm3lde7j4xsgpierjvfg';
  const COUNTDOWN_SEC = 4;

  const params       = new URLSearchParams(window.location.search);
  const phone        = params.get('phone') || '';
  const engagementId = params.get('engagement_id') || '';

  const phoneEl       = document.getElementById('phoneDisplay');
  const engEl         = document.getElementById('engagementDisplay');
  const actionsEl     = document.getElementById('actionsEl');
  const badgeEl       = document.getElementById('statusBadge');
  const countdownWrap = document.getElementById('countdownWrap');
  const countdownText = document.getElementById('countdownText');
  const countdownFill = document.getElementById('countdownFill');

  phoneEl.textContent = phone ? formatPhone(phone) : 'Number unavailable';
  if (!phone) phoneEl.classList.add('unknown');
  engEl.textContent = engagementId ? engagementId.slice(0, 20) + '…' : '—';

  if (phone) {
    fetch(MAKE_WEBHOOK + '?phone=' + encodeURIComponent(phone) + '&engagement_id=' + encodeURIComponent(engagementId), {
      method: 'GET', mode: 'no-cors'
    }).catch(function() {});
  }

  function formatPhone(num) {
    const d = num.replace(/\D/g, '');
    if (d.length === 11 && d[0] === '1') return `+1 (${d.slice(1,4)}) ${d.slice(4,7)}-${d.slice(7)}`;
    if (d.length === 10) return `(${d.slice(0,3)}) ${d.slice(3,6)}-${d.slice(6)}`;
    return num;
  }

  const agentDesktopURL = phone
    ? `${AGENT_DESKTOP}/?phone=${encodeURIComponent(phone)}&engagement_id=${encodeURIComponent(engagementId)}`
    : AGENT_DESKTOP;
  const newContactURL = `${FRESHDESK}/a/contacts/new?mobile=${encodeURIComponent(phone)}`;

  if (phone) {
    setBadge('badge-live', '● Live Call');
    renderActions(agentDesktopURL, newContactURL);
    startCountdown(agentDesktopURL);
  } else {
    setBadge('badge-nophone', 'No caller number');
    renderActions(null, newContactURL);
  }

  function setBadge(cls, text) {
    badgeEl.innerHTML = `<span class="status-badge ${cls}">${text}</span>`;
  }

  function renderActions(desktopUrl, newUrl) {
    let html = '';
    if (desktopUrl) {
      html += `<a class="btn btn-primary" href="${desktopUrl}" target="_blank">Open Agent Desktop ↗</a>`;
    }
    html += `<a class="btn btn-secondary" href="${newUrl}" target="_blank">Create New Contact in Freshdesk</a>`;
    actionsEl.innerHTML = html;
  }

  let countdownTimer = null;
  let cancelled = false;

  function startCountdown(url) {
    countdownWrap.style.display = 'block';
    const total = COUNTDOWN_SEC * 1000;
    const start = Date.now();

    countdownTimer = setInterval(() => {
      if (cancelled) return;
      const elapsed   = Date.now() - start;
      const remaining = Math.max(0, total - elapsed);
      const pct  = (remaining / total) * 100;
      countdownFill.style.width = pct + '%';
      const secs = Math.ceil(remaining / 1000);
      countdownText.textContent = `Opening Agent Desktop in ${secs}s…`;

      if (remaining <= 0) {
        clearInterval(countdownTimer);
        setBadge('badge-opening', 'Opening…');
        countdownText.textContent = 'Opening Agent Desktop…';
        window.location.href = url;
      }
    }, 80);
  }

  function cancelRedirect() {
    cancelled = true;
    clearInterval(countdownTimer);
    countdownWrap.style.display = 'none';
    setBadge('badge-cancelled', 'Auto-open cancelled');
  }

  window.cancelRedirect = cancelRedirect;
</script>
